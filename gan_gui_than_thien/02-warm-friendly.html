  return map[id] || id;
}

          <p class="text-sm text-[#a69480] leading-relaxed"><strong class="font-semibold text-white">Đơn vị công tác:</strong><br />${doctor.hospital}</p>
          <p class="text-xs text-[#8b7a6a] mt-3">* Mọi yêu cầu thăm khám qua cổng thông tin bệnh viện.</p>
        </div>
      </div>
      <div class="pt-8 flex flex-col md:flex-row gap-6 justify-between text-xs text-[#8b7a6a]">
        <div class="max-w-2xl"><strong class="text-[#a69480] uppercase block mb-1">Tuyên bố miễn trừ trách nhiệm</strong>Nội dung chỉ mang tính tham khảo, không thay thế thăm khám trực tiếp.</div>
        <div>&copy; ${new Date().getFullYear()} Dr. Trung.</div>
      </div>
    </div>
  </footer>`;
}

// ---- INTERACTIONS ----
function toggleMobileMenu() {
  isMobileOpen = !isMobileOpen;
  document.getElementById("mobile-menu").classList.toggle("hidden", !isMobileOpen);
  document.body.style.overflow = isMobileOpen ? "hidden" : "";
}
function closeMobileMenu() {
  isMobileOpen = false;
  document.getElementById("mobile-menu").classList.add("hidden");
  document.body.style.overflow = "";
}
function setupMobileMenu() {
  document.getElementById("mobile-menu").addEventListener("click", function(e) {
    if (e.target === this) closeMobileMenu();
  });
}

function setupObservers() {
  const options = { root: null, rootMargin: "-30% 0px -50% 0px", threshold: 0 };
  const observer = new IntersectionObserver((entries) => {
    const intersecting = entries.filter(e => e.isIntersecting);
    if (intersecting.length > 0) {
      const sorted = intersecting.sort((a,b) => a.boundingClientRect.top - b.boundingClientRect.top);
      state.activeSection = sorted[0].target.id;
      const oldHeader = document.getElementById("main-header");
      const newHeader = document.createElement("div");
      newHeader.innerHTML = renderHeader();
      oldHeader.replaceWith(newHeader.firstElementChild);
      setupObservers();
      setupMobileMenu();
    }
  }, options);
  sectionIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el);
  });
}

// Lightbox
let lightboxImages = [];
function openLightbox(index) {
  lightboxImages = certificates.map(c => ({ src: c.image, title: c.title, issuer: c.issuer, year: c.year }));
  showLightbox(index);
}
function showLightbox(idx) {
  const img = lightboxImages[idx];
  if (!img) return;
  document.getElementById("lightbox").innerHTML = [
    '<div class="fixed inset-0 z-50 flex items-center justify-center bg-[#3d2c1e]/95 backdrop-blur-sm p-4 md:p-8" onclick="closeLightbox()">',
    '<div class="relative flex items-center justify-center w-full max-w-4xl flex-1">',
    '<button onclick="showLightbox(' + ((idx-1+lightboxImages.length)%lightboxImages.length) + ')" class="absolute left-2 md:left-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>',
    '<div class="flex flex-col items-center max-h-[82vh] px-12 md:px-20">',
    '<img src="' + img.src + '" alt="' + img.title + '" class="max-h-[60vh] max-w-full object-contain rounded-2xl bg-white p-2 shadow-2xl" />',
    '<div class="mt-4 text-center text-white"><h3 class="text-xl font-bold serif">' + img.title + '</h3><p class="text-white/60 text-sm mt-1">' + img.issuer + ' \u00b7 ' + img.year + '</p><p class="text-white/40 text-xs mt-2">' + (idx+1) + ' / ' + lightboxImages.length + '</p></div>',
    '</div>',
    '<button onclick="showLightbox(' + ((idx+1)%lightboxImages.length) + ')" class="absolute right-2 md:right-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>',
    '</div>',
    '<button onclick="closeLightbox()" class="absolute top-4 right-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>',
    '</div>'
  ].join("");
  document.body.style.overflow = "hidden";
  document.addEventListener("keydown", le);
}
function le(e) { if (e.key === "Escape") closeLightbox(); }
function closeLightbox() { document.getElementById("lightbox").innerHTML = ""; document.body.style.overflow = ""; document.removeEventListener("keydown", le); }

// Event Gallery
let eg = [], egi = 0;
function openEventGallery(i) { const e = medicalEvents[i]; eg = e.images; egi = 0; showEG(e.title); }
function showEG(t) {
  if (!eg[egi]) return;
  var dots = "";
  for (var di = 0; di < eg.length; di++) {
    dots += '<button onclick="jEG(' + di + ')" class="w-2.5 h-2.5 rounded-full transition-all ' + (di===egi ? "bg-white w-6" : "bg-white/40 hover:bg-white/70") + '"></button>';
  }
  document.getElementById("event-gallery").innerHTML = [
    '<div class="fixed inset-0 z-50 flex flex-col bg-[#3d2c1e]/95 backdrop-blur-sm p-4 md:p-8" onclick="closeEG()">',
    '<div class="flex items-center justify-between pb-4 border-b border-white/10">',
    '<h3 class="text-white text-lg font-semibold serif truncate max-w-lg">' + t + '</h3>',
    '<button onclick="closeEG()" class="p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>',
    '</div>',
    '<div class="relative flex items-center justify-center flex-1 my-4">',
    '<button onclick="cEG(-1)" class="absolute left-2 md:left-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>',
    '<div class="flex flex-col items-center max-h-[62vh] px-12 md:px-20">',
    '<img src="' + eg[egi] + '" alt="" class="max-h-[52vh] max-w-full object-contain rounded-2xl shadow-2xl" />',
    '</div>',
    '<button onclick="cEG(1)" class="absolute right-2 md:right-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>',
    '</div>',
    '<div class="flex items-center justify-center gap-2 pt-4 border-t border-white/10">' + dots + '</div>',
    '</div>'
  ].join("");
  document.body.style.overflow = "hidden";
}
function cEG(d) { egi = (egi+d+eg.length)%eg.length; var th = document.querySelector("#event-gallery h3"); showEG(th ? th.textContent : ""); }
function jEG(i) { egi = i; var th = document.querySelector("#event-gallery h3"); showEG(th ? th.textContent : ""); }
function closeEG() { document.getElementById("event-gallery").innerHTML = ""; document.body.style.overflow = ""; }

render();
</script>
