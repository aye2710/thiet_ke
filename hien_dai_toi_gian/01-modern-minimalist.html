}

<script>
// ---- INTERACTIONS ----
function toggleMobileMenu() {
  isMobileOpen = !isMobileOpen;
  document.getElementById("mobile-menu").classList.toggle("hidden", !isMobileOpen);
  document.body.style.overflow = isMobileOpen ? "hidden" : "";
}
function closeMobileMenu() {
  isMobileOpen = false;
  document.getElementById("mobile-menu").classList.add("hidden");
  document.body.style.overflow = "";
}

function setupMobileMenu() {
  document.getElementById("mobile-menu").addEventListener("click", function(e) {
    if (e.target === this) closeMobileMenu();
  });
}

// Active section tracking
function setupObservers() {
  const options = { root: null, rootMargin: "-30% 0px -50% 0px", threshold: 0 };
  const observer = new IntersectionObserver((entries) => {
    const intersecting = entries.filter(e => e.isIntersecting);
    if (intersecting.length > 0) {
      const sorted = intersecting.sort((a,b) => a.boundingClientRect.top - b.boundingClientRect.top);
      state.activeSection = sorted[0].target.id;
      // Re-render header only (to update active link)
      const oldHeader = document.getElementById("main-header");
      const newHeader = document.createElement("div");
      newHeader.innerHTML = renderHeader();
      const rendered = newHeader.firstElementChild;
      oldHeader.replaceWith(rendered);
      setupObservers(); // re-setup because DOM changed
      setupMobileMenu();
    }
  }, options);
  sectionIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el);
  });
}

// Certificate Lightbox
let lightboxImages = [];
function openLightbox(index) {
  lightboxImages = certificates.map(c => ({ src: c.image, title: c.title, issuer: c.issuer, year: c.year }));
  showLightbox(index);
}
function showLightbox(idx) {
  const img = lightboxImages[idx];
  if (!img) return;
  document.getElementById("lightbox").innerHTML = `
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm p-4 md:p-8" onclick="closeLightbox()">
      <div class="relative flex items-center justify-center w-full max-w-4xl flex-1" onclick="e=>e.stopPropagation()">
        <button onclick="showLightbox(${(idx-1+lightboxImages.length)%lightboxImages.length})" class="absolute left-2 md:left-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
        <div class="flex flex-col items-center max-h-[82vh] px-12 md:px-20">
          <img src="${img.src}" alt="${img.title}" class="max-h-[60vh] max-w-full object-contain rounded bg-white p-2 shadow-2xl" />
          <div class="mt-4 text-center text-white"><h3 class="text-xl font-semibold">${img.title}</h3><p class="text-white/60 text-sm mt-1">${img.issuer} · ${img.year}</p><p class="text-white/40 text-xs mt-2">${idx+1} / ${lightboxImages.length}</p></div>
        </div>
        <button onclick="showLightbox(${(idx+1)%lightboxImages.length})" class="absolute right-2 md:right-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
      </div>
      <button onclick="closeLightbox()" class="absolute top-4 right-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>`;
  document.body.style.overflow = "hidden";
  document.addEventListener("keydown", lightboxKeyHandler);
}
function lightboxKeyHandler(e) {
  if (e.key === "Escape") closeLightbox();
}
function closeLightbox() {
  document.getElementById("lightbox").innerHTML = "";
  document.body.style.overflow = "";
  document.removeEventListener("keydown", lightboxKeyHandler);
}

// Event Gallery
let eventGalleryData = [];
let eventGalleryIdx = 0;
function openEventGallery(index) {
  const evt = medicalEvents[index];
  eventGalleryData = evt.images;
  eventGalleryIdx = 0;
  showEventGallery(evt.title);
}
function showEventGallery(title) {
  const img = eventGalleryData[eventGalleryIdx];
  if (!img) return;
  document.getElementById("event-gallery").innerHTML = `
    <div class="fixed inset-0 z-50 flex flex-col bg-black/95 backdrop-blur-sm p-4 md:p-8" onclick="closeEventGallery()">
      <div class="flex items-center justify-between pb-4 border-b border-white/10">
        <h3 class="text-white text-lg font-semibold truncate max-w-lg">${title}</h3>
        <button onclick="closeEventGallery()" class="p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="relative flex items-center justify-center flex-1 my-4" onclick="e=>e.stopPropagation()">
        <button onclick="changeEventImg(-1)" class="absolute left-2 md:left-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
        <div class="flex flex-col items-center max-h-[62vh] px-12 md:px-20">
          <img src="${img}" alt="" class="max-h-[52vh] max-w-full object-contain rounded shadow-2xl" />
        </div>
        <button onclick="changeEventImg(1)" class="absolute right-2 md:right-4 p-3 text-white/80 hover:text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-10"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
      </div>
      <div class="flex items-center justify-center gap-2 pt-4 border-t border-white/10">
        ${eventGalleryData.map((_,i) => `<button onclick="jumpEventImg(${i})" class="w-2.5 h-2.5 rounded-full transition-all ${i===eventGalleryIdx ? "bg-white w-6" : "bg-white/40 hover:bg-white/70"}"></button>`).join("")}
      </div>
    </div>`;
  document.body.style.overflow = "hidden";
}
function changeEventImg(dir) {
  eventGalleryIdx = (eventGalleryIdx + dir + eventGalleryData.length) % eventGalleryData.length;
  const titleEl = document.querySelector("#event-gallery h3");
  showEventGallery(titleEl ? titleEl.textContent : "");
}
function jumpEventImg(i) {
  eventGalleryIdx = i;
  const titleEl = document.querySelector("#event-gallery h3");
  showEventGallery(titleEl ? titleEl.textContent : "");
}
function closeEventGallery() {
  document.getElementById("event-gallery").innerHTML = "";
  document.body.style.overflow = "";
}

// Start app
render();
</script>
</body>
</html>
